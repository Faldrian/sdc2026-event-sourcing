# application.yml
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eventstore_demo
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate        # Schema kommt von Flyway, nicht von Hibernate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
